- name: configure shipping server
  hosts: shipping
  become: yes
  tasks:
  - name: install maven
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: present
    loop:
    - maven
    - mysql

  - name: install mysql python libraries
    ansible.builtin.pip:
      executable: pip3.9
      name: "{{ item }}"
    loop:
    - cryptography
    - PyMySQL

  - name: Create system-user
    ansible.builtin.user:
     name: roboshop
     comment: roboshop system user
     shell: /sbin/nologin
     create_home: yes
# Safe to remove directory, because 2nd time if we run it will download freshly. no error if does not exist
  - name: Remove app directory
    ansible.builtin.file:
     path: /app
     state: absent
  # Create app directory
  - name: Create app directory
    ansible.builtin.file:
     path: /app
     state: directory
  # Delete existing downloaded code
  - name: Delete shipping file
    ansible.builtin.file:
     path: /tmp/shipping.zip
     state: absent
  # Download fresh code to temp directory
  - name: Download shipping code
    ansible.builtin.get_url:
     url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip
     dest: /tmp/shipping.zip
  # unzip the code and move it to App directory.
  - name: Unzip code and move to app directory
    ansible.builtin.unarchive:
     src: /tmp/shipping.zip
     dest: /app 
     remote_src: yes
  # unzip the code and move it to App directory.
  - name: install dependencies
    ansible.builtin.command: mvn clean package
    args:
      chdir: /app

  - name: move jar file
    ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar
    args:
      chdir: /app

  - name: copy shipping service
    ansible.builtin.copy:
      src: shipping.service
      dest: /etc/systemd/system/shipping.service

  - name: import shipping data into mysql
    community.mysql.mysql_db:
      state: import
      name: all
      login_host: mysql.rscloudservices.icu
      login_user: root
      login_password: RoboShop@1
      target: "{{ item }}"
    loop:
    - /app/db/schema.sql
    - /app/db/app-user.sql 
    - /app/db/master-data.sql

  - name: daemon reload enable and start
    ansible.builtin.systemd_service:
      name: shipping
      enabled: true
      state: started
      daemon_reload: true