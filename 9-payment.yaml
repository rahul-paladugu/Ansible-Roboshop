- name: payment configuration
  hosts: payment
  become: yes
  tasks:
   - name: Install python3 gcc python3-devel
     ansible.builtin.dnf:
       name: "{{ item }}"
       state: present
     loop:
       - python3
       - gcc
       - python3-devel
   # Create system user
   - name: Create system-user
     ansible.builtin.user:
       name: roboshop
       comment: roboshop system user
       shell: /sbin/nologin
       create_home: yes
# Safe to remove directory, because 2nd time if we run it will download freshly. no error if does not exist
   - name: Remove app directory
     ansible.builtin.file:
      path: /app
      state: absent
   # Create app directory
   - name: Create app directory
     ansible.builtin.file:
       path: /app
       state: directory
   # Delete existing downloaded code
   - name: Delete payment file
     ansible.builtin.file:
      path: /tmp/payment.zip
      state: absent
   # Download fresh code to temp directory
   - name: Download payment code
     ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
      dest: /tmp/payment.zip
   # Unzip the code and move it to App directory.
   - name: Unzip code and move to app directory
     ansible.builtin.unarchive:
      src: /tmp/payment.zip
      dest: /app 
      remote_src: yes
   # Install code dependencies
   - name: Install Python requirements using pip3
     ansible.builtin.command: /usr/bin/python3 -m pip install -r /app/requirements.txt
   # Setup payment service
   - name: Setup payment service
     ansible.builtin.copy:
       src: payment.service
       dest: /etc/systemd/system/payment.service

   - name: Daemon reload
     ansible.builtin.systemd:
       daemon_reload: yes

   - name: Start and enable payment
     ansible.builtin.service:
       name: payment
       state: started
       enabled: yes